<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KB루키 지점장 키우기 - Splash</title>
    <link rel="stylesheet" href="../css/SplashScreePage.css" />
  </head>
  <body>
    <div class="splash-page">
      <!-- 배경 효과 -->
      <div class="bg-gradient"></div>
      <div class="grid-overlay"></div>
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>

      <!-- 떠다니는 장식 -->
      <div class="floating floating-star star-1">★</div>
      <div class="floating floating-star star-2">★</div>
      <div class="floating floating-star star-3">★</div>
      <div class="floating floating-coin coin-1">₩</div>
      <div class="floating floating-coin coin-2">₩</div>
      <div class="floating floating-coin coin-3">₩</div>

      <!-- 파티클 캔버스 -->
      <canvas id="particle-canvas"></canvas>

      <!-- 메인 컨텐츠 -->
      <main class="content">
        <div class="logo-wrap">
          <img
            src="../assets/image/logo.png"
            alt="KB루키 지점장 키우기 로고"
            class="logo"
          />
        </div>

        <div class="loading-section">
          <div class="loading-label">
            <span id="loading-percent">0%</span>
          </div>

          <div class="loading-bar">
            <div class="loading-fill" id="loading-fill"></div>
            <div class="loading-glow"></div>
          </div>
        </div>

        <button class="start-btn hidden" id="start-btn">시작하기</button>
      </main>
    </div>

    <script src="../js/SplashScreePage.js"></script>
  </body>
</html>
