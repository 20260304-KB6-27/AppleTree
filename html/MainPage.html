<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>KB 루키 - 지점장 키우기</title>
    <link rel="stylesheet" href="../css/MainPage.css" />
    <link rel="stylesheet" href="../css/Global.css" />
  </head>

  <body>
    <div id="container">
      <!-- 배경 -->
      <img id="bg" />

      <!-- 상단 UI -->
      <div id="top-ui">
        <div id="progress-container">
          <div id="progress-bar">
            <div id="progress"></div>
            <div id="text-container">
              <span id="level-text"></span>
              <span id="exp-text"></span>
            </div>
          </div>

          <button id="levelBtn" disabled>LEVEL UP</button>
        </div>
      </div>

      <!-- 캐릭터 -->
      <div id="character-area">
        <img id="character" />
      </div>

      <!-- 시작 -->
      <button id="startBtn">시작 하기</button>
    </div>

    <script src="../js/MainPage.js"></script>
  </body>
</html>
